<div class="view-dialog media-dialog-shell">
  <form (ngSubmit)="save()">
    <div class="view-dialog__header">
      <div class="view-dialog__header-copy">
        <span class="view-dialog__eyebrow">Metadata</span>
        <h2>编辑内容</h2>
        <p>修改标题与过期策略，保留现有详情页的沉浸式信息结构。</p>
      </div>
      <button type="button" mat-icon-button (click)="close()" aria-label="关闭">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="view-dialog__content">
      <section class="view-dialog__panel">
        <div class="view-dialog__section-head">
          <h3>基础信息</h3>
          <span>#{{ image.id | slice:0:8 }}</span>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Title</mat-label>
          <input
            matInput
            type="text"
            [ngModelOptions]="{ standalone: true }"
            [(ngModel)]="image.file_name"
          />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Expires After</mat-label>
          <mat-select
            [ngModelOptions]="{ standalone: true }"
            [(ngModel)]="expiresAfter"
          >
            <mat-option
              *ngFor="let option of ExpireOptions"
              [value]="option[1]"
            >
              {{ option[0] }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </section>
    </div>

    <div class="view-dialog__actions">
      <button type="button" mat-button (click)="close()">取消</button>
      <button type="submit" mat-raised-button color="primary">保存</button>
    </div>
  </form>
</div>
