<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__brand">
      <span class="auth-card__eyebrow">Register</span>
      <img src="/assets/branding/text/picsur_light.svg" alt="Picsur Text Logo" />
      <h1>注册新账户</h1>
      <p>创建账户后即可进入媒体工作区，开始上传、整理和分享你的内容。</p>
    </div>

    <form class="auth-card__form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>用户名</mat-label>
        <input
          matInput
          type="text"
          [formControl]="model.username"
          name="username"
          autocorrect="off"
          autocapitalize="none"
          required
        />
        <mat-error *ngIf="model.username.errors">
          {{ model.usernameError }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>密码</mat-label>
        <input
          matInput
          type="password"
          [formControl]="model.password"
          name="password"
          required
        />
        <mat-error *ngIf="model.password.errors">
          {{ model.passwordError }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>确认密码</mat-label>
        <input
          matInput
          type="password"
          [formControl]="model.passwordConfirm"
          name="confirmpassword"
          required
        />
        <mat-error *ngIf="model.passwordConfirm.errors">
          {{ model.passwordConfirmError }}
        </mat-error>
      </mat-form-field>

      <div class="auth-card__actions">
        <button *ngIf="showLogin" mat-stroked-button type="button" (click)="onLogin()">
          登录
        </button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          {{ loading ? '加载中...' : '注册' }}
        </button>
      </div>
    </form>

    <div class="auth-card__footer" *ngIf="showLogin">
      已经有账户？<a (click)="onLogin()">返回登录</a>
    </div>
  </div>
</div>
