<div class="app-shell">
  <div class="app-shell__backdrop">
    <span class="app-shell__orb app-shell__orb--a"></span>
    <span class="app-shell__orb app-shell__orb--b"></span>
    <span class="app-shell__orb app-shell__orb--c"></span>
  </div>

  <app-header
    [enableHamburger]="hasSidebar && !isDesktop"
    (onHamburgerClick)="sidebar.toggle()"
    [loading]="loading"
  ></app-header>

  <app-drag-overlay></app-drag-overlay>

  <mat-sidenav-container class="app-shell__drawer">
    <mat-sidenav
      class="sidenav-nav"
      [mode]="isDesktop ? 'side' : 'over'"
      opened="false"
    >
      <ng-template [cdkPortalOutlet]="sidebarPortal"></ng-template>
    </mat-sidenav>

    <mat-sidenav-content>
      <div class="app-shell__content">
        <div class="header-spacer"></div>
        <main
          class="app-shell__route-frame"
          [class.app-shell__route-frame--contained]="wrapContentWithContainer"
          [@mainAnimation]="getRouteAnimData()"
        >
          <router-outlet></router-outlet>
        </main>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
