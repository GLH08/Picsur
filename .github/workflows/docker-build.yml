name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Migration 验证任务
  # ============================================
  migration-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: pnpm --filter picsur-backend install

      - name: Run migration dry-run
        run: |
          cd backend
          pnpm migration:show || true
        env:
          PICSUR_DB_HOST: localhost
          PICSUR_DB_PORT: 5432
          PICSUR_DB_USERNAME: postgres
          PICSUR_DB_PASSWORD: postgres
          PICSUR_DB_DATABASE: test
          PICSUR_SYNCHRONIZE: false

  # ============================================
  # 构建和推送镜像
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: [migration-check]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            # 分支名标签
            type=ref,event=branch
            # 分支名-短commit hash 标签
            type=ref,event=branch,suffix=-{{sha}}
            # main 分支额外打 latest 标签
            type=raw,value=latest,enable={{is_default_branch}}
            # 语义化版本标签 (v1.2.3 -> 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 构建并推送 Docker Hub (可选)
  # ============================================
  # 如需启用 Docker Hub 推送：
  # 1. 在 GitHub Secrets 中添加 DOCKERHUB_USERNAME 和 DOCKERHUB_TOKEN
  # 2. 取消注释以下 job

  # docker-hub-push:
  #   runs-on: ubuntu-latest
  #   needs: [build-and-push]
  #   if: startsWith(github.ref, 'refs/tags/v')
  #   permissions:
  #     contents: read
  #
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #
  #     - name: Set up Docker Buildx
  #       uses: docker/setup-buildx-action@v3
  #
  #     - name: Log in to Docker Hub
  #       uses: docker/login-action@v3
  #       with:
  #         username: ${{ secrets.DOCKERHUB_USERNAME }}
  #         password: ${{ secrets.DOCKERHUB_TOKEN }}
  #
  #     - name: Extract metadata for Docker
  #       id: meta
  #       uses: docker/metadata-action@v5
  #       with:
  #         images: |
  #           ${{ secrets.DOCKERHUB_USERNAME }}/picsur
  #         tags: |
  #           type=semver,pattern={{version}}
  #           type=semver,pattern={{major}}.{{minor}}
  #           type=semver,pattern={{major}}
  #           type=raw,value=latest,enable={{is_default_branch}}
  #
  #     - name: Build and push to Docker Hub
  #       uses: docker/build-push-action@v5
  #       with:
  #         context: .
  #         push: true
  #         tags: ${{ steps.meta.outputs.tags }}
  #         labels: ${{ steps.meta.outputs.labels }}
  #         cache-from: type=gha
  #         cache-to: type=gha,mode=max

  # ============================================
  # 生产部署（仅在 main 分支推送标签时触发）
  # ============================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "=========================================="
          echo " Production Deployment Triggered"
          echo "=========================================="
          echo " Tag: ${{ github.ref }}"
          echo " Image: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo ""
          echo " To update your production server, run:"
          echo "   docker compose -f docker-compose.remote.yml pull"
          echo "   docker compose -f docker-compose.remote.yml up -d"
          echo "=========================================="

      # 在这里添加您的生产部署脚本
      # 例如：
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1.0.3
