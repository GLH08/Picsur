name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Migration 验证任务
  # ============================================
  migration-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: pnpm --filter picsur-backend install

      - name: Run migration dry-run
        run: |
          cd backend
          pnpm migration:show || true
        env:
          PICSUR_DB_HOST: localhost
          PICSUR_DB_PORT: 5432
          PICSUR_DB_USERNAME: postgres
          PICSUR_DB_PASSWORD: postgres
          PICSUR_DB_DATABASE: test
          PICSUR_SYNCHRONIZE: false

  # ============================================
  # 构建和推送镜像
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: [migration-check]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            # 分支名标签
            type=ref,event=branch
            # 分支名-短commit hash 标签
            type=ref,event=branch,suffix=-{{sha}}
            # main 分支打 latest 标签
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 构建并推送 Docker Hub (可选)
  # ============================================
  # 如需启用 Docker Hub 推送：
  # 1. 在 GitHub Secrets 中添加 DOCKERHUB_USERNAME 和 DOCKERHUB_TOKEN
  # 2. 取消注释以下 job

